<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nima T. Bazargani</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background:
        linear-gradient(rgba(2,6,23,0.82), rgba(2,6,23,0.92)),
        url('/images/bg0.png');

      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      color: #f8fafc;

      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
    }

    .welcome-container {

      text-align: center;

      max-width: 900px;

      padding: 2rem;

      animation: fadeIn 1.5s ease;
    }

    .welcome-logo img {

      width: 150px;

      max-width: 60vw;

      opacity: 0.96;

      margin-bottom: 2rem;

      filter:
        drop-shadow(0 0 18px rgba(56,189,248,0.45));
    }

    .welcome-title {

      font-size: 3.2rem;

      margin-bottom: 1rem;

      font-weight: 700;

      letter-spacing: 0.05em;

      color: #38bdf8;

      text-shadow:
        0 0 20px rgba(56,189,248,0.65);
    }

    .welcome-quote {

      font-size: 1.2rem;

      line-height: 1.9;

      max-width: 760px;

      margin:
        0 auto
        2.5rem auto;

      color: #e2e8f0;

      font-style: italic;
    }

    .enter-btn {

      display: inline-block;

      padding:
        0.95rem
        2.4rem;

      border-radius: 999px;

      text-decoration: none;

      font-size: 1rem;

      letter-spacing: 0.08em;

      color: white;

      border:
        1px solid rgba(56,189,248,0.6);

      background:
        rgba(56,189,248,0.14);

      transition:
        all 0.25s ease;
    }

    .enter-btn:hover {

      transform: translateY(-2px);

      background:
        rgba(56,189,248,0.22);

      box-shadow:
        0 0 18px rgba(56,189,248,0.35);
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {

      .welcome-title {
        font-size: 2.2rem;
      }

      .welcome-quote {
        font-size: 1rem;
      }

      .welcome-logo img {
        width: 110px;
      }
    }

  </style>

</head>

<body>

  <div class="welcome-container">

```
<div class="welcome-logo">
  <img src="/images/NT.jpg" alt="NT Logo">
</div>

<div class="welcome-title">
  Nima T. Bazargani
</div>

<div class="welcome-quote">
  “xxxxxxx xxxx xxxx”
</div>

<a href="/home/" class="enter-btn">
  ENTER
</a>
```

  </div>

</body>

</html>
